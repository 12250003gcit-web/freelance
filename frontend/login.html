<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SkillVerify</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-offset">

<nav class="nav" id="mainNav">
  <div class="wrap nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-gem">SV</div>Skill<b>Verify</b>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="jobs.html">Jobs</a></li>
      <li><a href="test.html">Test</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
    <div class="nav-auth" id="navGuest">
      <a href="login.html" class="active">Login</a>
      <a href="register.html" class="nav-cta">Get Started</a>
    </div>
    <div class="nav-auth" id="navUser" style="display:none">
      <a href="dashboard.html">Dashboard</a>
      <a href="#" onclick="logout()" style="color:var(--red);background:var(--red-dim);padding:6px 14px;border-radius:7px">Logout</a>
    </div>
    <button class="nav-ham" id="navHam" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="nav-veil" id="navVeil"></div>
<div class="nav-drawer" id="navDrawer">
  <ul class="drawer-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="jobs.html">Jobs</a></li>
    <li><a href="test.html">Test</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
  </ul>
  <div class="drawer-auth" id="drawerGuest">
    <a href="login.html">Login</a>
    <a href="register.html" class="d-cta">Get Started →</a>
  </div>
  <div class="drawer-auth" id="drawerUser" style="display:none">
    <a href="dashboard.html">My Dashboard</a>
    <a href="#" onclick="logout()" class="d-logout">Logout</a>
  </div>
</div>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-brand">
      <div class="auth-brand-gem">SV</div>
      Skill<b>Verify</b>
    </div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div class="alert alert-err" id="formAlert"><span>⚠</span><span></span></div>
    <div class="alert alert-ok"  id="formAlertOk"><span>✓</span><span></span></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pwd-wrap">
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
          <button type="button" class="pwd-toggle" aria-label="Toggle password visibility" onclick="togglePassword('password', this)">
            <svg id="eyeIcon-password" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign in</button>
    </form>
    <p class="auth-foot">Don't have an account? <a href="register.html">Create one free →</a></p>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (location.search.includes('registered=1')) {
    const el = document.getElementById('formAlertOk');
    if (el) { el.classList.add('show'); el.querySelector('span:last-child').textContent = 'Account created! Sign in below.'; }
  }
</script>
</body>
</html>
